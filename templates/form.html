<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <title>Concept Engineers — Fee Proposal Generator</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    header {
      background: #1f3355;
      color: white;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .spacer {
      flex: 1;
    }

    .header-badge {
      font-size: 10px;
      background: rgba(255, 255, 255, 0.12);
      padding: 4px 10px;
      border-radius: 20px;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 6px;
    }

    .shell {
      max-width: 1000px;
      margin: 32px auto;
      padding: 0 16px 64px;
    }

    .page-intro {
      margin-bottom: 20px;
    }

    .page-intro h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1f3355;
    }

    .page-intro p {
      font-size: 13px;
      color: #718096;
      margin-top: 2px;
    }

    .card {
      background: white;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .card-head {
      background: #f7f9fc;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 20px;
      font-weight: 600;
      font-size: 13px;
      color: #2e75b6;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-head svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    .card-body {
      padding: 20px;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 4px;
    }

    label .opt {
      font-weight: 400;
      color: #a0aec0;
    }

    input[type=text],
    input[type=email],
    input[type=date],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e0;
      border-radius: 5px;
      font-size: 13.5px;
      color: #2d3748;
      background: white;
      transition: border-color .15s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #2e75b6;
      box-shadow: 0 0 0 3px rgba(46, 117, 182, .12);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .checks {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chk-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
      transition: border-color .15s, background .15s;
      user-select: none;
    }

    .chk-label input[type=checkbox] {
      accent-color: #2e75b6;
      width: 15px;
      height: 15px;
    }

    .chk-label:has(input:checked) {
      border-color: #2e75b6;
      background: #eef4fb;
      color: #1f3355;
    }

    #uw-level-row {
      display: none;
      margin-top: 10px;
      align-items: center;
      gap: 10px;
    }

    #uw-level-row.visible {
      display: flex;
    }

    .row-table {
      width: 100%;
      border-collapse: collapse;
    }

    .row-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding-bottom: 6px;
      border-bottom: 1px solid #e2e8f0;
    }

    .row-table td {
      padding: 5px 4px;
      vertical-align: middle;
    }

    .row-table td:last-child {
      width: 36px;
      text-align: center;
    }

    .amount-cell input {
      text-align: right;
    }

    .btn-add {
      margin-top: 10px;
      background: none;
      border: 1.5px dashed #cbd5e0;
      border-radius: 5px;
      padding: 7px 14px;
      font-size: 13px;
      color: #4a5568;
      cursor: pointer;
      width: 100%;
      transition: border-color .15s, color .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-add svg {
      width: 14px;
      height: 14px;
    }

    .btn-add:hover {
      border-color: #2e75b6;
      color: #2e75b6;
    }

    .btn-del {
      background: none;
      border: none;
      cursor: pointer;
      color: #e53e3e;
      padding: 0 4px;
      opacity: .6;
      transition: opacity .15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-del svg {
      width: 16px;
      height: 16px;
    }

    .btn-del:hover {
      opacity: 1;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .list-item input {
      flex: 1;
    }

    .submit-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .btn-submit {
      background: #1f3355;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 11px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-submit svg {
      width: 16px;
      height: 16px;
    }

    .btn-submit:hover {
      background: #2e75b6;
    }

    .btn-submit:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    select#output_fmt {
      width: auto;
      padding: 8px 10px;
    }

    .spinner {
      display: none;
      align-items: center;
      gap: 8px;
      color: #4a5568;
      font-size: 13px;
    }

    .spinner.show {
      display: flex;
    }

    .spin-ring {
      width: 18px;
      height: 18px;
      border: 2.5px solid #e2e8f0;
      border-top-color: #2e75b6;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .cap-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .cap-tile {
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
    }

    .cap-tile input[type=radio] {
      accent-color: #2e75b6;
      width: 15px;
      height: 15px;
    }

    .cap-tile:has(input:checked) {
      border-color: #2e75b6;
      background: #eef4fb;
      color: #1f3355;
    }

    #custom-cap {
      display: none;
    }

    #custom-cap.visible {
      display: block;
    }

    /* Success banner — fixed bottom card with signing link */
    .signing-banner {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 2px solid #10b981;
      border-radius: 12px;
      padding: 18px 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      z-index: 9999;
      max-width: 480px;
      width: 90%;
    }

    .banner-title {
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 700;
      color: #1f3355;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .banner-title svg {
      width: 18px;
      height: 18px;
      color: #10b981;
      flex-shrink: 0;
    }

    .banner-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: #1f3355;
      color: white;
      text-align: center;
      padding: 11px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .banner-link svg {
      width: 15px;
      height: 15px;
    }

    .banner-actions {
      display: flex;
      gap: 8px;
    }

    .banner-actions button {
      flex: 1;
      padding: 7px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .banner-actions button svg {
      width: 13px;
      height: 13px;
    }

    .btn-copy-link {
      border: 1.5px solid #1f3355;
      background: transparent;
      color: #1f3355;
      font-weight: 600;
    }

    .btn-close-banner {
      border: 1.5px solid #e2e8f0;
      background: transparent;
      color: #718096;
    }

    @media (max-width: 580px) {

      .grid2,
      .grid3,
      .cap-grid {
        grid-template-columns: 1fr;
      }

      .submit-bar {
        flex-direction: column;
        align-items: stretch;
      }

      header {
        padding: 0 16px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Concept Engineers</h1>
    <!-- <div class="spacer"></div> -->
    <div class="header-badge">CE Proposal System</div>
  </header>

  <!-- PROPOSAL FORM -->
  <div class="shell">
    <form id="proposalForm" action="/generate" method="POST">

      <!-- 1. DOCUMENT -->
      <div class="card">
        <div class="card-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <line x1="10" y1="9" x2="8" y2="9"></line>
          </svg>
          Document
        </div>
        <div class="card-body">
          <div class="grid3">
            <div>
              <label>Proposal Ref</label>
              <input type="text" name="proposal_ref" placeholder="CE-2026-0412" required>
            </div>
            <div>
              <label>Date</label>
              <input type="date" name="proposal_date" id="proposalDate">
            </div>
            <div>
              <label>Revision</label>
              <input type="text" name="revision" value="Rev A">
            </div>
          </div>
        </div>
      </div>

      <!-- 2. CLIENT -->
      <div class="card">
        <div class="card-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M3 21h18"></path>
            <path d="M5 21V7l8-4v18"></path>
            <path d="M19 21V11l-6-4"></path>
            <path d="M9 9v.01"></path>
            <path d="M9 12v.01"></path>
            <path d="M9 15v.01"></path>
            <path d="M9 18v.01"></path>
          </svg>
          Client &amp; Project
        </div>
        <div class="card-body">
          <div class="grid2" style="margin-bottom:14px">
            <div>
              <label>Contact Name <span style="color:#e53e3e">*</span></label>
              <input type="text" name="contact_name" placeholder="David Lee" required>
            </div>
            <div>
              <label>Company</label>
              <input type="text" name="company_name" placeholder="Skyline Developments Pty Ltd">
            </div>
            <div>
              <label>Contact Email <span style="color:#e53e3e">*</span></label>
              <input type="email" name="contact_email" placeholder="david@skyline.com.au">
            </div>
            <div>
              <label>Project / Site Address <span style="color:#e53e3e">*</span></label>
              <input type="text" name="project_address" placeholder="42 Riverside Drive, Brisbane QLD 4000" required>
            </div>
          </div>
          <div>
            <label>Project Understanding <span class="opt">(1–2 sentences)</span></label>
            <textarea name="project_understanding" rows="3"
              placeholder="We understand the project involves…"></textarea>
          </div>
        </div>
      </div>

      <!-- 3. SCOPE -->
      <div class="card">
        <div class="card-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"></path>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
          Scope of Services
        </div>
        <div class="card-body">
          <div class="checks">
            <label class="chk-label"><input type="checkbox" name="is_da" id="cb_da"> Development Approval (DA)</label>
            <label class="chk-label"><input type="checkbox" name="is_dd" id="cb_dd"> Detailed Design (DD)</label>
            <label class="chk-label"><input type="checkbox" name="is_uu" id="cb_uu"> Urban Utilities (UU)</label>
            <label class="chk-label"><input type="checkbox" name="is_uw" id="cb_uw" onchange="toggleUW()"> Certifier
              (UW)</label>
            <label class="chk-label"><input type="checkbox" name="uu_works_only"> UU Works Only</label>
          </div>
          <div id="uw-level-row">
            <label style="margin:0;white-space:nowrap">UW Level:</label>
            <select name="uw_level">
              <option value="Minor">Minor</option>
              <option value="Major">Major</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 4. CAPABILITY -->
      <div class="card">
        <div class="card-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="8" r="6"></circle>
            <path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"></path>
          </svg>
          Capability Profile
        </div>
        <div class="card-body">
          <div class="cap-grid">
            <label class="cap-tile"><input type="radio" name="capability_profile" value="residential" checked
                onchange="capChange()"> Residential Subdivision</label>
            <label class="cap-tile"><input type="radio" name="capability_profile" value="commercial"
                onchange="capChange()"> Commercial &amp; Industrial</label>
            <label class="cap-tile"><input type="radio" name="capability_profile" value="infrastructure"
                onchange="capChange()"> Civil Infrastructure</label>
            <label class="cap-tile"><input type="radio" name="capability_profile" value="stormwater"
                onchange="capChange()"> Stormwater &amp; Drainage</label>
            <label class="cap-tile"><input type="radio" name="capability_profile" value="custom" onchange="capChange()">
              Custom…</label>
          </div>
          <div id="custom-cap">
            <div style="margin-bottom:10px">
              <label>Custom Profile Title</label>
              <input type="text" name="capability_title" placeholder="e.g. Land Development">
            </div>
            <div>
              <label>Custom Profile Body</label>
              <textarea name="capability_body" rows="3"
                placeholder="Describe your firm's relevant capability…"></textarea>
            </div>
          </div>
        </div>
      </div>

      <!-- 5. FEE SCHEDULE -->
      <div class="card">
        <div class="card-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"></line>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
          </svg>
          Fee Schedule
        </div>
        <div class="card-body">
          <table class="row-table">
            <thead>
              <tr>
                <th>Service Component</th>
                <th style="width:130px">Fee (AUD ex GST)</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="fee-rows">
              <tr>
                <td><input type="text" name="fee_desc[]" placeholder="Development Approval (DA) civil engineering"></td>
                <td class="amount-cell"><input type="text" name="fee_amount[]" placeholder="8,500.00"></td>
                <td>
                  <button type="button" class="btn-del" onclick="delRow(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                      stroke-linejoin="round">
                      <line x1="18" y1="6" x2="6" y2="18"></line>
                      <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
          <button type="button" class="btn-add" onclick="addFeeRow()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Add fee line
          </button>

          <div style="margin-top:20px;border-top:1px solid #e2e8f0;padding-top:16px">
            <div
              style="font-size:12px;font-weight:600;color:#4a5568;margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">
              Hourly Rates <span style="font-weight:400;color:#a0aec0">(optional)</span>
            </div>
            <table class="row-table">
              <thead>
                <tr>
                  <th>Role</th>
                  <th style="width:160px">Rate (AUD/hr ex GST)</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="hr-rows"></tbody>
            </table>
            <button type="button" class="btn-add" onclick="addHrRow()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Add hourly rate
            </button>
          </div>

          <div style="margin-top:16px">
            <label>Payment Terms</label>
            <input type="text" name="payment_terms"
              value="Fees are invoiced at agreed milestones, payable within 14 days.">
          </div>
        </div>
      </div>

      <!-- 6. ASSUMPTIONS / EXCLUSIONS -->
      <div class="card">
        <div class="card-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"></path>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
          Assumptions &amp; Exclusions
        </div>
        <div class="card-body grid2">
          <div>
            <label style="margin-bottom:8px">Assumptions</label>
            <div id="assumption-list">
              <div class="list-item">
                <input type="text" name="assumption[]" placeholder="A current detail survey will be provided.">
                <button type="button" class="btn-del" onclick="delRow(this)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                  </svg>
                </button>
              </div>
            </div>
            <button type="button" class="btn-add"
              onclick="addListItem('assumption-list','assumption[]','Add assumption')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Add
            </button>
          </div>
          <div>
            <label style="margin-bottom:8px">Exclusions</label>
            <div id="exclusion-list">
              <div class="list-item">
                <input type="text" name="exclusion[]" placeholder="Authority application and lodgement fees.">
                <button type="button" class="btn-del" onclick="delRow(this)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                  </svg>
                </button>
              </div>
            </div>
            <button type="button" class="btn-add" onclick="addListItem('exclusion-list','exclusion[]','Add exclusion')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Add
            </button>
          </div>
        </div>
      </div>

      <!-- 7. SENDER -->
      <details class="card" style="overflow:visible">
        <summary class="card-head" style="cursor:pointer;list-style:none;display:flex;justify-content:space-between">
          <span style="display:flex;align-items:center;gap:8px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" style="width:15px;height:15px;">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Sender Details
          </span>
          <span style="color:#a0aec0;font-weight:400">▾</span>
        </summary>
        <div class="card-body grid2">
          <div><label>Name</label><input type="text" name="sender_name" value="Gina Harper"></div>
          <div><label>Title</label><input type="text" name="sender_title" value="Director"></div>
          <div><label>Email</label><input type="email" name="sender_email" value="gina@conceptengineers.com.au"></div>
          <div><label>Phone</label><input type="text" name="sender_phone" value="+61 7 0000 0000"></div>
        </div>
      </details>

      <!-- SUBMIT BAR -->
      <div class="submit-bar">
        <button type="button" class="btn-submit" id="btnGenerate" onclick="handleGenerate()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
          </svg>
          Generate Proposal
        </button>
        <select name="output_fmt" id="output_fmt" style="cursor:pointer;height:40px;">
          <option value="docx">Download as DOCX</option>
          <option value="pdf">Download as PDF</option>
        </select>
        <div class="spinner" id="spinner">
          <div class="spin-ring"></div>
          <span id="spinnerMsg">Processing…</span>
        </div>
      </div>

    </form>
  </div>

  <script>
    document.getElementById('proposalDate').valueAsDate = new Date();

    // ── TOAST ──────────────────────────────────────────────────────────────────
    function showToast(message, type = "success") {
      Toastify({
        text: message,
        duration: 5000,
        gravity: "top",
        position: "right",
        style: {
          background: type === "success" ? "#10b981" : type === "error" ? "#ef4444" : "#3b82f6",
          color: "#fff",
          borderRadius: "8px",
          padding: "12px 16px",
          boxShadow: "0 4px 15px rgba(0,0,0,0.2)",
        },
        stopOnFocus: true,
      }).showToast();
    }

    // ── FORM HELPERS ───────────────────────────────────────────────────────────
    function toggleUW() {
      document.getElementById('uw-level-row').classList.toggle('visible', document.getElementById('cb_uw').checked);
    }
    function capChange() {
      const val = document.querySelector('[name=capability_profile]:checked')?.value;
      document.getElementById('custom-cap').classList.toggle('visible', val === 'custom');
    }

    const DEL_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;

    function addFeeRow() {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td><input type="text" name="fee_desc[]" placeholder="Service description"></td>
    <td class="amount-cell"><input type="text" name="fee_amount[]" placeholder="0.00"></td>
    <td><button type="button" class="btn-del" onclick="delRow(this)">${DEL_ICON}</button></td>`;
      document.getElementById('fee-rows').appendChild(tr);
      tr.querySelector('input').focus();
    }
    function addHrRow() {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td><input type="text" name="hourly_role[]" placeholder="Senior Engineer"></td>
    <td class="amount-cell"><input type="text" name="hourly_rate[]" placeholder="185.00"></td>
    <td><button type="button" class="btn-del" onclick="delRow(this)">${DEL_ICON}</button></td>`;
      document.getElementById('hr-rows').appendChild(tr);
      tr.querySelector('input').focus();
    }
    function addListItem(listId, fieldName, placeholder) {
      const div = document.createElement('div');
      div.className = 'list-item';
      div.innerHTML = `<input type="text" name="${fieldName}" placeholder="${placeholder}">
    <button type="button" class="btn-del" onclick="delRow(this)">${DEL_ICON}</button>`;
      document.getElementById(listId).appendChild(div);
      div.querySelector('input').focus();
    }
    function delRow(btn) {
      const row = btn.closest('tr') || btn.closest('.list-item');
      if (row) row.remove();
    }

    // ── PROPOSAL GENERATION + DOCUSEAL FLOW ───────────────────────────────────
    async function handleGenerate() {
      const form = document.getElementById('proposalForm');
      const spinner = document.getElementById('spinner');
      const spinnerMsg = document.getElementById('spinnerMsg');
      const btn = document.getElementById('btnGenerate');
      const contactName = form.querySelector('[name="contact_name"]')?.value.trim();
      const contactEmail = form.querySelector('[name="contact_email"]')?.value.trim();
      const projectAddr = form.querySelector('[name="project_address"]')?.value.trim();

      if (!contactName || !contactEmail || !projectAddr) {
        showToast("Contact Name, Email and Project Address are required", "error");
        return;
      }

      btn.disabled = true;
      spinner.classList.add('show');

      try {
        // STEP 1 — Generate DOCX as base64
        spinnerMsg.textContent = "Step 1/3 — Generating document…";
        const formData = new FormData(form);
        const genRes = await fetch('/generate?base64=true', { method: 'POST', body: formData });
        const genData = await genRes.json();
        if (!genData.success) throw new Error(genData.error || "Document generation failed");

        // STEP 2 — Upload to DocuSeal
        spinnerMsg.textContent = "Step 2/3 — Uploading to DocuSeal…";
        const ref = formData.get('proposal_ref') || 'CE';
        const docType = formData.get('document_type') || 'Proposal';
        const templateName = `${docType} - ${contactName} - ${ref}`;

        const uploadRes = await fetch('/api/upload-template', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ documentBase64: genData.documentBase64, templateName }),
        });
        const uploadData = await uploadRes.json();
        if (!uploadData.success) throw new Error(uploadData.error || "Upload failed");

        // STEP 2b — Confirm template
        const getRes = await fetch(`/api/get-template/${uploadData.templateId}`);
        const getData = await getRes.json();
        if (!getData.success) throw new Error("Template confirmation failed");

        // STEP 3 — Send to client
        spinnerMsg.textContent = "Step 3/3 — Sending to client…";
        const sendRes = await fetch('/api/send-proposal', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            templateId: uploadData.templateId,
            client_name: contactName,
            client_email: contactEmail,
            project_address: projectAddr,
          }),
        });
        const sendData = await sendRes.json();
        if (!sendData.success) throw new Error(sendData.error || "Send failed");

        showToast(`Proposal sent to ${contactEmail}`, "success");

        // Show signing banner
        if (sendData.signingUrl) {
          const old = document.getElementById('signing-banner');
          if (old) old.remove();
          const banner = document.createElement('div');
          banner.id = 'signing-banner';
          banner.className = 'signing-banner';
          banner.innerHTML = `
        <div class="banner-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          Proposal Sent!
        </div>
        <div style="font-size:13px;color:#4a5568;margin-bottom:12px;">
          Signing email sent to <strong>${contactEmail}</strong>. Share this link directly if needed:
        </div>
        <a href="${sendData.signingUrl}" target="_blank" class="banner-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
          Open Client Signing Page
        </a>
        <div style="font-size:11px;color:#718096;word-break:break-all;margin-bottom:8px;" id="signingUrlText">${sendData.signingUrl}</div>
        <div class="banner-actions">
          <button class="btn-copy-link" onclick="copySigningLink()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Copy Link
          </button>
          <button class="btn-close-banner" onclick="document.getElementById('signing-banner').remove()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            Close
          </button>
        </div>`;
          document.body.appendChild(banner);
        }

        // Auto-download document
        const fmt = document.getElementById('output_fmt')?.value || 'docx';
        const ext = fmt === 'pdf' ? '.pdf' : '.docx';
        const mime = fmt === 'pdf' ? 'application/pdf'
          : 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
        const a = document.createElement('a');
        a.href = `data:${mime};base64,${genData.documentBase64}`;
        a.download = `${ref}${ext}`;
        a.click();

      } catch (err) {
        console.error(err);
        showToast(err.message || "Unknown error", "error");
      } finally {
        btn.disabled = false;
        spinner.classList.remove('show');
        spinnerMsg.textContent = "Processing…";
      }
    }

    function copySigningLink() {
      const url = document.getElementById('signingUrlText')?.textContent;
      if (url) {
        navigator.clipboard.writeText(url).then(() => showToast('Copied!', 'success'));
      }
    }
  </script>
</body>

</html>
